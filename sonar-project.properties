# Metadata
sonar.projectKey=bolt-client-manager
sonar.projectName=Bolt Client Manager
sonar.projectVersion=1.0.0

# Path to source directories (relative to root)
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.sourceEncoding=UTF-8

# Exclusions from analysis
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.spec.ts,**/*Test.java,**/tools/**

# Java compiler binaries location
sonar.java.binaries=backend/target/classes
